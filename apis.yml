name: Elasticsearch
description: Elasticsearch is a distributed, RESTful search and analytics engine capable of addressing a growing number of use cases. As the heart of the Elastic Stack, it centrally stores your data for lightning fast search, fine‑tuned relevancy, and powerful analytics that scale with ease.
image: https://static-www.elastic.co/v3/assets/bltefdd0b53724fa2ce/blt6ae3d6980b5fd629/5bbca1d1af3a954c36f95ed3/logo-elastic.svg
created: '2024'
modified: '2024'
specificationVersion: '0.18'
url: https://www.elastic.co/elasticsearch/
tags:
- Search
- Analytics
- Database
- Distributed Systems
- Real-time
- NoSQL
- Full-text Search
apis:
- name: Elasticsearch REST API
  description: The main REST API for interacting with Elasticsearch clusters, including document indexing, searching, and cluster management.
  image: https://static-www.elastic.co/v3/assets/bltefdd0b53724fa2ce/blt6ae3d6980b5fd629/5bbca1d1af3a954c36f95ed3/logo-elastic.svg
  humanURL: https://www.elastic.co/guide/en/elasticsearch/reference/current/rest-apis.html
  baseURL: https://localhost:9200
  tags:
  - REST API
  - Search
  - Indexing
  properties:
