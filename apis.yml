- name: Elasticsearch Query DSL API
  description: Domain Specific Language for defining search queries with powerful filtering, aggregations, and scoring capabilities.
  humanURL: https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl.html
  baseURL: https://localhost:9200
  tags:
  - Query
  - Search
  - DSL
  properties:
  - type: documentation
    url: https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl.html
  - type: examples
