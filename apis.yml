aid: elastic-search
name: Elasticsearch
description: >-
  Elasticsearch is a distributed, RESTful search and analytics engine capable
  of addressing a growing number of use cases. As the heart of the Elastic
  Stack, it centrally stores data for fast search, fine-tuned relevancy, and
  powerful analytics that scale with ease. It provides a comprehensive REST API
  for document indexing, searching, aggregations, and cluster management.
type: Index
