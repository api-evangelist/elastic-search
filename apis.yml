- name: Elasticsearch Index API
  description: APIs for creating, deleting, and managing indices and their mappings.
  humanURL: https://www.elastic.co/guide/en/elasticsearch/reference/current/indices.html
  baseURL: https://localhost:9200
  tags:
  - Index Management
  - Mappings
  - Settings
  properties:
  - type: documentation
    url: https://www.elastic.co/guide/en/elasticsearch/reference/current/indices.html
- name: Elasticsearch Cluster API
  description: APIs for cluster-level operations including health monitoring, stats, and configuration.
  humanURL: https://www.elastic.co/guide/en/elasticsearch/reference/current/cluster.html
